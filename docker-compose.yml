version: '3.8'

services:
  web:
    build: .
    image: codespaces-react-web:latest
    ports:
      - "3000:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=http://backend:3001
    depends_on:
      - backend
      - image-service

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: codespaces-react-backend:latest
    ports:
      - "3001:3001"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    env_file:
      - .env

  image-service:
    build: ./docker/image-service
    image: codespaces-react-image-service:latest
    ports:
      - "5000:5000"
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  cosmosdb-emulator:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    container_name: cosmosdb-emulator
    ports:
      - "8081:8081"
      - "10250-10255:10250-10255"  # For emulator UI and data explorer
    environment:
      - AZURE_COSMOS_EMULATOR_PARTITION_COUNT=10
      - AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE=true
    volumes:
      - ./cosmos-data:/tmp/cosmos/appdata  # Persist data locally

# Note: this compose file runs the frontend (nginx) on host port 3000
# and the image-processing service on 5000. Adjust ports as needed.
