        <h2 style="font-size: 2rem; margin-bottom: 40px; text-align: center;">📐 Specificity Formula</h2>

        <div class="specificity-formula">
            <strong>Specificity = (IDs, Classes/Attributes/Pseudo-classes, Elements)</strong><br><br>
            <strong>Example 1:</strong> #myId input.myClass → <strong>1-1-1</strong><br>
            <strong>Example 2:</strong> input[type="password"]:required → <strong>0-2-1</strong><br>
            <strong>Example 3:</strong> html body main input → <strong>0-0-4</strong><br><br>
            <em>Specificity is compared left-to-right: One ID beats any number of classes or elements!</em>
        </div>

        <div class="tips-section">
            <h2>💡 Best Practices & Tips</h2>
            <ul>
                <li><strong>Keep specificity low:</strong> Use classes instead of IDs in stylesheets. Reserve IDs for
                    JavaScript targeting.</li>
                <li><strong>Avoid !important:</strong> Use @layer and cascade order instead. It makes code harder to
                    maintain.</li>
                <li><strong>Use @layer for organization:</strong> Reset → Base → Theme → Components → Utilities</li>
                <li><strong>Understand the cascade:</strong> When specificity is equal, the last rule in source wins.
                </li>
                <li><strong>:where() for base styles:</strong> Use it for low-specificity resets and defaults that are
                    easy to override.</li>
                <li><strong>:is() for component selectors:</strong> Use it when you need the highest specificity from
                    multiple options.</li>
                <li><strong>Test in DevTools:</strong> Use browser DevTools to inspect which rules apply and their
                    specificity.</li>
                <li><strong>Document cascade layers:</strong> Add comments explaining your @layer strategy in complex
                    projects.</li>
            </ul>
