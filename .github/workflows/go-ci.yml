name: Go CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Run go fmt
        run: |
          gofmt -l .
          test -z "$(gofmt -l .)" || (echo "Run gofmt" && exit 1)

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -v

      - name: Optional: golangci-lint (skip if not needed)
        run: |
          if ! command -v golangci-lint >/dev/null 2>&1; then
            echo "golangci-lint not found; skipping lint step"
          else
            golangci-lint run
          fi
